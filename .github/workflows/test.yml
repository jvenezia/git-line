name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build test image
        run: ./docker-build

      - name: Run checks
        run: ./docker-run check

      - name: Run tests
        run: ./docker-run test
